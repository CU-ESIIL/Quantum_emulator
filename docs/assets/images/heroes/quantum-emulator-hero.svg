<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Minimal emulator workflow graphs</title>
  <desc id="desc">Flat vector charts showing environmental data becoming a QUBO model, then emulator and baseline tradeoff results.</desc>
  <defs>
    <linearGradient id="softPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3faf8"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#123d58" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="980" height="560" rx="36" fill="#f8fbfa"/>
  <path d="M42 454 C164 384 253 430 350 365 C479 279 594 348 720 242 C800 176 868 176 938 118" fill="none" stroke="#e4eeeb" stroke-width="18" stroke-linecap="round"/>
  <path d="M40 458 C164 388 254 432 350 366 C480 280 594 348 720 244 C800 178 868 178 940 120" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="52" y="62" width="252" height="188" rx="22" fill="url(#softPanel)" stroke="#d9e7e3"/>
    <rect x="366" y="62" width="252" height="188" rx="22" fill="url(#softPanel)" stroke="#d9e7e3"/>
    <rect x="676" y="62" width="252" height="188" rx="22" fill="url(#softPanel)" stroke="#d9e7e3"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M92 206 H268" stroke="#c8d9d5" stroke-width="2"/>
    <path d="M92 86 V206" stroke="#c8d9d5" stroke-width="2"/>
    <path d="M100 184 C124 146 148 158 168 126 C192 88 222 112 262 88" stroke="#234a65" stroke-width="5"/>
    <path d="M100 194 C126 178 150 184 174 168 C202 149 226 156 262 142" stroke="#42bcdc" stroke-width="5"/>
    <circle cx="168" cy="126" r="6" fill="#234a65"/>
    <circle cx="262" cy="142" r="6" fill="#42bcdc"/>

    <path d="M410 206 H586" stroke="#c8d9d5" stroke-width="2"/>
    <path d="M410 86 V206" stroke="#c8d9d5" stroke-width="2"/>
    <rect x="430" y="168" width="22" height="38" rx="4" fill="#b9dfd6"/>
    <rect x="466" y="134" width="22" height="72" rx="4" fill="#42bcdc"/>
    <rect x="502" y="112" width="22" height="94" rx="4" fill="#007135"/>
    <rect x="538" y="94" width="22" height="112" rx="4" fill="#234a65"/>
    <path d="M426 110 L452 136 L484 104 L518 128 L558 90" stroke="#161a19" stroke-width="4"/>

    <path d="M716 206 H892" stroke="#c8d9d5" stroke-width="2"/>
    <path d="M716 86 V206" stroke="#c8d9d5" stroke-width="2"/>
    <path d="M724 180 C760 174 780 152 806 146 C842 138 858 112 888 96" stroke="#234a65" stroke-width="6"/>
    <path d="M724 194 C752 190 778 182 806 168 C838 154 862 146 888 136" stroke="#007135" stroke-width="6"/>
    <circle cx="888" cy="96" r="7" fill="#234a65"/>
    <circle cx="888" cy="136" r="7" fill="#007135"/>
  </g>

  <g font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" fill="#123d58">
    <text x="88" y="288" font-size="18" font-weight="700">Environmental signals</text>
    <text x="404" y="288" font-size="18" font-weight="700">Binary decision model</text>
    <text x="718" y="288" font-size="18" font-weight="700">Compared outcomes</text>
  </g>

  <g fill="none" stroke="#b7cbc6" stroke-width="2">
    <path d="M306 156 H358"/>
    <path d="M350 148 L358 156 L350 164"/>
    <path d="M620 156 H672"/>
    <path d="M664 148 L672 156 L664 164"/>
  </g>

  <g transform="translate(94 354)">
    <rect x="0" y="0" width="792" height="104" rx="26" fill="#ffffff" stroke="#d9e7e3"/>
    <circle cx="58" cy="52" r="22" fill="#e8f5f1"/>
    <path d="M46 52 H70 M58 40 V64" stroke="#007135" stroke-width="4" stroke-linecap="round"/>
    <text x="100" y="46" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#123d58">No quantum hardware required</text>
    <text x="100" y="75" font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif" font-size="16" fill="#4b635f">Run local emulator experiments, compare baselines, and map selected monitoring sites.</text>
  </g>
