<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Actual ecological monitoring demo comparison</title>
  <desc id="desc">Bar charts from the checked-in demo run comparing the quantum-inspired emulator and greedy baseline for selected sites, biological value, cost, environmental distance, and represented regions.</desc>
  <rect width="980" height="560" rx="34" fill="#f8fbfa"/>
  <rect x="46" y="42" width="888" height="476" rx="28" fill="#ffffff" stroke="#d9e7e3"/>

  <g font-family="Avenir Next, Avenir, Helvetica, Arial, sans-serif">
    <text x="86" y="94" fill="#123d58" font-size="31" font-weight="700">Actual demo run</text>
    <text x="86" y="126" fill="#536a66" font-size="17">100 candidate sites. Both methods selected 12. Values below come from site_selection_comparison.csv.</text>

    <g transform="translate(86 168)">
      <rect width="376" height="274" rx="22" fill="#f4faf8" stroke="#d9e7e3"/>
      <text x="28" y="40" fill="#123d58" font-size="18" font-weight="700">Tradeoff profile</text>

      <text x="28" y="82" fill="#536a66" font-size="14">Mean biological value</text>
      <rect x="28" y="94" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="94" width="167" height="16" rx="8" fill="#234a65"/>
      <rect x="28" y="116" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="116" width="209" height="16" rx="8" fill="#007135"/>
      <text x="326" y="108" fill="#123d58" font-size="13">0.59</text>
      <text x="326" y="130" fill="#123d58" font-size="13">0.73</text>

      <text x="28" y="166" fill="#536a66" font-size="14">Environmental distance</text>
      <rect x="28" y="178" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="178" width="286" height="16" rx="8" fill="#234a65"/>
      <rect x="28" y="200" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="200" width="172" height="16" rx="8" fill="#007135"/>
      <text x="326" y="192" fill="#123d58" font-size="13">1.04</text>
      <text x="326" y="214" fill="#123d58" font-size="13">0.63</text>

      <circle cx="30" cy="244" r="6" fill="#234a65"/>
      <text x="44" y="249" fill="#536a66" font-size="14">Emulator</text>
      <circle cx="126" cy="244" r="6" fill="#007135"/>
      <text x="140" y="249" fill="#536a66" font-size="14">Greedy baseline</text>
    </g>

    <g transform="translate(506 168)">
      <rect width="376" height="274" rx="22" fill="#f4faf8" stroke="#d9e7e3"/>
      <text x="28" y="40" fill="#123d58" font-size="18" font-weight="700">Selection summary</text>

      <g transform="translate(28 76)">
        <rect width="142" height="76" rx="18" fill="#ffffff" stroke="#d9e7e3"/>
        <text x="20" y="32" fill="#123d58" font-size="28" font-weight="700">12</text>
        <text x="20" y="56" fill="#536a66" font-size="14">sites selected</text>
      </g>
      <g transform="translate(194 76)">
        <rect width="142" height="76" rx="18" fill="#ffffff" stroke="#d9e7e3"/>
        <text x="20" y="32" fill="#123d58" font-size="28" font-weight="700">3</text>
        <text x="20" y="56" fill="#536a66" font-size="14">regions covered</text>
      </g>

      <text x="28" y="188" fill="#536a66" font-size="14">Total cost</text>
      <rect x="28" y="202" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="202" width="286" height="16" rx="8" fill="#234a65"/>
      <rect x="28" y="224" width="286" height="16" rx="8" fill="#e4eeeb"/>
      <rect x="28" y="224" width="271" height="16" rx="8" fill="#007135"/>
      <text x="326" y="216" fill="#123d58" font-size="13">65.9k</text>
      <text x="326" y="238" fill="#123d58" font-size="13">62.5k</text>
    </g>

    <text x="86" y="482" fill="#536a66" font-size="15">Interpretation: this run shows a concrete tradeoff, not a claim of quantum advantage. The emulator selected a more environmentally spread-out network; the greedy baseline scored higher on mean biological value and lower total cost.</text>
  </g>
</svg>
