site_name: "Quantum Emulator for Environmental Data Science"
site_description: "A training sandbox for quantum-ready environmental data science workflows"
site_url: "https://cu-esiil.github.io/Quantum_emulator/"

repo_name: "CU-ESIIL/Quantum_emulator"
repo_url: "https://github.com/CU-ESIIL/Quantum_emulator"
edit_uri: "edit/main/docs/"

exclude_docs: |
  ai-infrastructure/**
  available-models.md
  cyverse.md
  developer-docs.md
  examples.md
  examples/**
  modify.md
  slides.md

hooks:
  - hooks.py

nav:
  - Home: index.md
  - Why Quantum for EDS?: why-quantum-for-eds.md
  - Scientific Grounding: scientific-grounding.md
  - The Example Problem: example-problem.md
  - Build a Decision Table: build-decision-table.md
  - QUBO / Ising Explainer: qubo-explainer.md
  - Run the Quantum Emulator: run-the-demo.md
  - Interpret the Results: interpret-results.md
  - Where This Could Go Next: next-steps.md
  - Data Preparation Reference:
      - Local Setup: start-here.md
      - Bring Your Own Data: provide-your-own-data-sources.md
      - Harmonizer for Emulator Inputs: data-harmonizer.md
      - Agents and Emulator Workflows: agents-and-systems.md

theme:
  name: material
  logo: assets/quantum-infrastructure-logo.png
  favicon: assets/esiil_content/favicon.png
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
  toc:
    integrate: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/javascripts/site-links.js

plugins:
  - search
